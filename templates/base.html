<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juniper Firewall Administration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .navbar {
            background-color: #1a1a2e;
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 1.3rem;
        }
        .sidebar {
            background-color: #16213e;
            min-height: 100vh;
            padding: 20px 0;
        }
        .sidebar a {
            color: #e0e0e0;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
            transition: all 0.3s;
        }
        .sidebar a:hover,
        .sidebar a.active {
            background-color: #0f3460;
            color: #fff;
            padding-left: 30px;
        }
        .main-content {
            padding: 30px;
        }
        .card {
            box-shadow: 0 1px 3px rgba(0,0,0,.1);
            border: none;
            margin-bottom: 20px;
        }
        .card-header {
            background-color: #0f3460;
            color: white;
            border-bottom: 2px solid #e94560;
        }
        .btn-primary {
            background-color: #0f3460;
            border-color: #0f3460;
        }
        .btn-primary:hover {
            background-color: #1a1a2e;
            border-color: #1a1a2e;
        }
        .badge-allow {
            background-color: #28a745;
        }
        .badge-deny {
            background-color: #dc3545;
        }
        .badge-reject {
            background-color: #ffc107;
            color: #000;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-shield-alt"></i> Juniper Firewall Admin
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'admin:index' %}">Admin Panel</a>
                    </li>
                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'admin:logout' %}">Logout ({{ user }})</a>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'admin:login' %}">Login</a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar">
                <a href="/" class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="{% url 'policies:policy-list' %}" class="{% if 'policy' in request.resolver_match.url_name %}active{% endif %}">
                    <i class="fas fa-list"></i> Policies
                </a>
                <a href="{% url 'policies:policy-create' %}">
                    <i class="fas fa-plus"></i> New Policy
                </a>
                <a href="{% url 'policies:zone-list' %}">
                    <i class="fas fa-th"></i> Zones
                </a>
                <hr style="border-color: #0f3460; margin: 20px 0;">
                <a href="{% url 'admin:index' %}">
                    <i class="fas fa-cog"></i> Django Admin
                </a>
            </div>

            <!-- Main Content -->
            <div class="col-md-10 main-content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
