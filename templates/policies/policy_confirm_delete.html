{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card border-danger">
            <div class="card-header bg-danger">
                <h5 class="mb-0">Delete Policy</h5>
            </div>
            <div class="card-body">
                <p class="mb-3">
                    Are you sure you want to delete the policy <strong>{{ policy.name }}</strong>?
                </p>
                <p class="text-danger">
                    <i class="fas fa-exclamation-triangle"></i> This action cannot be undone.
                </p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash"></i> Delete Policy
                        </button>
                        <a href="{% url 'policies:policy-detail' policy.pk %}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
